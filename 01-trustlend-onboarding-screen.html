<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    @import url('https://fonts.cdnfonts.com/css/satoshi');
    
    :root {
      --navy: #0A0F1E;
      --gold: #F5A623;
    }

    body {
      font-family: 'Satoshi', sans-serif;
      background-color: var(--navy);
      color: white;
      margin: 0;
      padding: 0;
    }

    .gold-glow {
      text-shadow: 0 0 20px rgba(245, 166, 35, 0.3);
    }

    .blur-blob {
      position: absolute;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(245, 166, 35, 0.08) 0%, rgba(10, 15, 30, 0) 70%);
      filter: blur(40px);
      z-index: 0;
    }
  </style>
</head>
<body>
  <div class="w-full h-screen flex flex-col bg-[#0A0F1E] relative overflow-hidden">
    
    <!-- Decorative Background Elements -->
    <div class="blur-blob -top-20 -left-20"></div>
    <div class="blur-blob bottom-40 -right-20"></div>

    <!-- Header -->
    <header class="shrink-0 pt-14 px-8 z-10">
      <div class="flex items-center gap-2">
        <div class="w-8 h-8 rounded-lg bg-[#F5A623] flex items-center justify-center shadow-lg shadow-[#F5A623]/20">
          <iconify-icon icon="lucide:landmark" class="text-[#0A0F1E] text-lg"></iconify-icon>
        </div>
        <span class="font-bold text-xl tracking-tight">TrustLend</span>
      </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col px-8 pt-12 z-10">
      <div class="flex-1 flex flex-col justify-center">
        <!-- Hero Graphic (Subtle Abstract) -->
        <div class="mb-10 relative">
          <div class="w-24 h-24 rounded-3xl border border-[#F5A623]/20 rotate-12 absolute -top-4 -left-4"></div>
          <div class="w-24 h-24 rounded-3xl bg-gradient-to-br from-[#F5A623] to-[#D48A1B] flex items-center justify-center shadow-2xl shadow-[#F5A623]/30 relative z-10">
            <iconify-icon icon="lucide:wallet" class="text-4xl text-[#0A0F1E]"></iconify-icon>
          </div>
        </div>

        <h1 class="text-[42px] leading-[1.1] font-bold tracking-tight mb-4">
          Your wallet <br/>
          <span class="text-[#F5A623] gold-glow">is your bank</span>
        </h1>
        
        <p class="text-gray-400 text-lg leading-relaxed max-w-[280px]">
          Access borderless credit instantly using your digital reputation.
        </p>
      </div>

      <!-- Trust Indicators -->
      <div class="grid grid-cols-3 gap-4 py-8 border-t border-white/5">
        <div class="flex flex-col items-center text-center">
          <div class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center mb-2">
            <iconify-icon icon="lucide:ban" class="text-[#F5A623] text-lg"></iconify-icon>
          </div>
          <span class="text-[10px] uppercase tracking-widest text-gray-500 font-bold leading-tight">No bank required</span>
        </div>
        <div class="flex flex-col items-center text-center">
          <div class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center mb-2">
            <iconify-icon icon="lucide:shield-check" class="text-[#F5A623] text-lg"></iconify-icon>
          </div>
          <span class="text-[10px] uppercase tracking-widest text-gray-500 font-bold leading-tight">Data stays yours</span>
        </div>
        <div class="flex flex-col items-center text-center">
          <div class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center mb-2">
            <iconify-icon icon="lucide:zap" class="text-[#F5A623] text-lg"></iconify-icon>
          </div>
          <span class="text-[10px] uppercase tracking-widest text-gray-500 font-bold leading-tight">Loans in 60s</span>
        </div>
      </div>
    </main>

    <!-- Footer / CTA -->
    <footer class="shrink-0 pb-[34px] px-8 z-10">
      <div class="flex flex-col gap-4">
        <!-- Primary Button -->
        <a href="#" id="connect-wallet-btn" class="w-full h-14 bg-[#F5A623] rounded-2xl flex items-center justify-center gap-3 active:scale-[0.98] transition-all group">
          <span class="text-[#0A0F1E] font-bold text-lg">Connect Wallet</span>
          <div class="flex items-center -space-x-1 ml-1">
             <iconify-icon icon="logos:metamask-icon" class="text-xl"></iconify-icon>
             <iconify-icon icon="logos:walletconnect" class="text-lg bg-white rounded-full p-0.5 border border-white"></iconify-icon>
          </div>
        </a>
        
        <p class="text-center text-gray-500 text-sm">
          New to DeFi? <a href="#" id="learn-more-link" class="text-white border-b border-white/20 pb-0.5">Learn how it works</a>
        </p>
      </div>
    </footer>

  </div>
</body>
</html>
