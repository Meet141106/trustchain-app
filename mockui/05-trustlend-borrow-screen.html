<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    @import url('https://fonts.cdnfonts.com/css/satoshi');
    
    :root {
      --navy: #0A0F1E;
      --gold: #F5A623;
    }

    body {
      font-family: 'Satoshi', sans-serif;
      background-color: var(--navy);
      color: white;
      margin: 0;
      padding: 0;
    }

    .gold-glow {
      text-shadow: 0 0 20px rgba(245, 166, 35, 0.3);
    }

    .blur-blob {
      position: absolute;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(245, 166, 35, 0.08) 0%, rgba(10, 15, 30, 0) 70%);
      filter: blur(40px);
      z-index: 0;
    }

    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      height: 6px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 5px;
      background-image: linear-gradient(var(--gold), var(--gold));
      background-repeat: no-repeat;
      background-size: 50% 100%;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      height: 20px;
      width: 20px;
      border-radius: 50%;
      background: var(--gold);
      cursor: pointer;
      box-shadow: 0 0 10px rgba(245, 166, 35, 0.5);
    }
  </style>
  <style>sd-component { display: block; }</style>
  <script src="https://cdn.jsdelivr.net/npm/petite-vue@0.4.1/dist/petite-vue.iife.js" defer init></script>
</head>
<body>
  <div class="w-full h-screen flex flex-col bg-[#0A0F1E] relative overflow-hidden">
    
    <!-- Decorative Background Elements -->
    <div class="blur-blob -top-20 -right-20"></div>
    <div class="blur-blob top-1/2 -left-20"></div>

    <!-- Header Component -->
    <!-- component: Header (bd202092-713c-4cf4-9f6d-98b812d02225) -->
<div v-scope="{ ...{&quot;homeHref&quot;:&quot;https://draft-86f3e69d-7c2e-46d2-b819-1484ce374498.preview.superdesign.dev&quot;}, $emit() {} }">
<header class="shrink-0 pt-14 px-8 z-10"><a :href="homeHref" class="flex items-center gap-2 no-underline text-inherit"><div class="w-8 h-8 rounded-lg bg-[#F5A623] flex items-center justify-center shadow-lg shadow-[#F5A623]/20"><iconify-icon icon="lucide:landmark" class="text-[#0A0F1E] text-lg"></iconify-icon></div><span class="font-bold text-xl tracking-tight text-white">TrustLend</span></a></header>
</div>
<!-- /component: Header (bd202092-713c-4cf4-9f6d-98b812d02225) -->

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto px-6 pt-6 pb-32 z-10">
      <div class="space-y-8">
        
        <!-- Amount Input Section -->
        <div class="text-center">
          <p class="text-gray-500 text-sm font-bold uppercase tracking-widest mb-2">Borrow Amount</p>
          <div class="flex items-center justify-center gap-2">
            <span class="text-4xl font-bold text-[#F5A623] tracking-tighter">$</span>
            <input type="number" value="2500" class="bg-transparent text-5xl font-bold tracking-tight text-white w-48 text-center border-none outline-none focus:ring-0">
          </div>
          <p class="text-gray-500 text-xs mt-2">Available limit: $5,000</p>
        </div>

        <!-- Duration Slider -->
        <div class="bg-white/5 border border-white/10 rounded-3xl p-6 space-y-4">
          <div class="flex justify-between items-center">
            <span class="text-gray-400 font-medium">Duration</span>
            <span class="text-[#F5A623] font-bold">3 Months</span>
          </div>
          <input type="range" min="1" max="24" value="12" class="w-full">
          <div class="flex justify-between text-[10px] text-gray-500 font-bold uppercase tracking-wider">
            <span>1 Week</span>
            <span>6 Months</span>
          </div>
        </div>

        <!-- Solo vs Group Toggle -->
        <div class="flex p-1 bg-white/5 border border-white/10 rounded-2xl">
          <button class="flex-1 py-3 px-4 bg-[#F5A623] text-[#0A0F1E] font-bold rounded-xl flex items-center justify-center gap-2">
            <iconify-icon icon="lucide:user" class="text-lg"></iconify-icon>
            Solo Loan
          </button>
          <button class="flex-1 py-3 px-4 text-gray-400 font-bold flex items-center justify-center gap-2">
            <iconify-icon icon="lucide:users" class="text-lg"></iconify-icon>
            Group Loan
          </button>
        </div>

        <!-- Dynamic Details Grid -->
        <div class="grid grid-cols-2 gap-4">
          <div class="bg-white/5 border border-white/10 rounded-3xl p-5">
            <p class="text-gray-500 text-xs font-bold uppercase tracking-wider mb-1">Interest Rate</p>
            <p class="text-xl font-bold text-white">4.2% <span class="text-xs text-green-500 font-normal ml-1">-1% Rep Bonus</span></p>
          </div>
          <div class="bg-white/5 border border-white/10 rounded-3xl p-5">
            <p class="text-gray-500 text-xs font-bold uppercase tracking-wider mb-1">Collateral</p>
            <div class="flex items-center gap-1.5">
              <iconify-icon icon="lucide:shield-check" class="text-[#F5A623]"></iconify-icon>
              <p class="text-xl font-bold text-white">None</p>
            </div>
          </div>
        </div>

        <!-- Total Repayment Summary -->
        <div class="bg-[#F5A623]/5 border border-[#F5A623]/20 rounded-3xl p-6">
          <div class="flex justify-between items-center mb-1">
            <span class="text-gray-400 font-medium">Total Repayment</span>
            <span class="text-2xl font-bold text-white">$2,605.00</span>
          </div>
          <p class="text-xs text-gray-500">$868.33 / month for 3 months</p>
        </div>

        <!-- Large CTA Button -->
        <!-- Note: Manual implementation because PrimaryButton component hardcodes "Connect Wallet" -->
        <a href="https://draft-f0e1d96b-332a-4ef3-8ddb-9162947be859.preview.superdesign.dev" id="request-loan-btn" class="w-full h-16 bg-[#F5A623] rounded-2xl flex items-center justify-center gap-2 active:scale-[0.98] transition-all group shadow-xl shadow-[#F5A623]/20">
          <span class="text-[#0A0F1E] font-bold text-xl uppercase tracking-tight">Request Loan</span>
          <iconify-icon icon="lucide:arrow-right" class="text-[#0A0F1E] text-xl group-hover:translate-x-1 transition-transform"></iconify-icon>
        </a>

      </div>
    </main>

    <!-- Bottom Tab Bar -->
    <!-- component: BottomTabBar (f4af316d-a3ce-499f-a7c9-bcbd63afc6a8) -->
<div v-scope="{ ...{&quot;activeItem&quot;:&quot;home&quot;,&quot;homeHref&quot;:&quot;https://draft-86f3e69d-7c2e-46d2-b819-1484ce374498.preview.superdesign.dev&quot;,&quot;investHref&quot;:&quot;https://draft-efb2cc33-6230-46b6-8890-4a19567c3d76.preview.superdesign.dev&quot;,&quot;profileHref&quot;:&quot;https://draft-c80517e1-b249-4ec0-8bb1-060260ed2d66.preview.superdesign.dev&quot;}, $emit() {} }">
<nav class="fixed bottom-0 left-0 right-0 h-[88px] bg-[#0F1420] border-t border-white/5 flex items-center justify-around px-4 z-50"><a :href="homeHref" class="flex flex-col items-center gap-1 transition-colors hover:text-[#F5A623]" :class="activeItem === 'home' ? 'text-[#F5A623]' : 'text-gray-400'"><iconify-icon icon="lucide:home" class="text-2xl"></iconify-icon><span class="text-[10px] font-bold uppercase tracking-widest">Home</span></a><a :href="investHref" class="flex flex-col items-center gap-1 transition-colors hover:text-[#F5A623]" :class="activeItem === 'invest' ? 'text-[#F5A623]' : 'text-gray-400'"><iconify-icon icon="lucide:trending-up" class="text-2xl"></iconify-icon><span class="text-[10px] font-bold uppercase tracking-widest">Invest</span></a><a :href="profileHref" class="flex flex-col items-center gap-1 transition-colors hover:text-[#F5A623]" :class="activeItem === 'profile' ? 'text-[#F5A623]' : 'text-gray-400'"><iconify-icon icon="lucide:user" class="text-2xl"></iconify-icon><span class="text-[10px] font-bold uppercase tracking-widest">Profile</span></a></nav>
</div>
<!-- /component: BottomTabBar (f4af316d-a3ce-499f-a7c9-bcbd63afc6a8) -->

  </div>
</body>
</html>
