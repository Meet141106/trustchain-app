<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    @import url('https://fonts.cdnfonts.com/css/satoshi');
    
    :root {
      --navy: #0A0F1E;
      --gold: #F5A623;
    }

    * {
      font-family: 'Satoshi', sans-serif;
    }

    .gold-glow {
      text-shadow: 0 0 20px rgba(245, 166, 35, 0.3);
    }

    .blur-blob {
      position: absolute;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(245, 166, 35, 0.08) 0%, rgba(10, 15, 30, 0) 70%);
      filter: blur(40px);
      z-index: 0;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
    }

    .health-bar {
      background: linear-gradient(90deg, #10B981 0%, #F59E0B 50%, #EF4444 100%);
    }
  </style>
  <style>sd-component { display: block; }</style>
  <script src="https://cdn.jsdelivr.net/npm/petite-vue@0.4.1/dist/petite-vue.iife.js" defer init></script>
</head>
<body>
  <div class="w-full h-screen flex flex-col bg-[#0A0F1E] relative overflow-hidden">
    
    <!-- Decorative Background Elements -->
    <div class="blur-blob -top-20 -left-20"></div>
    <div class="blur-blob top-1/2 -right-20"></div>

    <!-- Header Component -->
    <!-- component: Header (bd202092-713c-4cf4-9f6d-98b812d02225) -->
<div v-scope="{ ...{&quot;homeHref&quot;:&quot;https://draft-86f3e69d-7c2e-46d2-b819-1484ce374498.preview.superdesign.dev&quot;}, $emit() {} }">
<header class="shrink-0 pt-14 px-8 z-10"><a :href="homeHref" class="flex items-center gap-2 no-underline text-inherit"><div class="w-8 h-8 rounded-lg bg-[#F5A623] flex items-center justify-center shadow-lg shadow-[#F5A623]/20"><iconify-icon icon="lucide:landmark" class="text-[#0A0F1E] text-lg"></iconify-icon></div><span class="font-bold text-xl tracking-tight text-white">TrustLend</span></a></header>
</div>
<!-- /component: Header (bd202092-713c-4cf4-9f6d-98b812d02225) -->

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto px-6 pt-6 pb-[122px] z-10">
      <!-- Greeting & Limit Section -->
      <section class="mb-8">
        <p class="text-gray-400 text-sm mb-1">Available to Borrow</p>
        <div class="flex items-baseline gap-2">
          <h1 class="text-4xl font-bold tracking-tight text-white">$1,250.00</h1>
          <span class="text-[#F5A623] text-sm font-semibold">USD</span>
        </div>
      </section>

      <!-- Stats Grid -->
      <div class="grid grid-cols-2 gap-4 mb-8">
        <div class="glass-card p-4 rounded-3xl flex flex-col">
          <div class="flex items-center gap-2 mb-3">
            <iconify-icon icon="lucide:file-text" class="text-[#F5A623] text-lg"></iconify-icon>
            <span class="text-xs font-bold text-gray-400 uppercase tracking-widest">Active Loan</span>
          </div>
          <div class="mt-auto">
            <p class="text-xl font-bold text-white">$450</p>
            <p class="text-[10px] text-gray-500 font-medium uppercase mt-1">Due in 12 days</p>
          </div>
        </div>

        <div class="glass-card p-4 rounded-3xl flex flex-col">
          <div class="flex items-center gap-2 mb-3">
            <iconify-icon icon="lucide:layers" class="text-[#F5A623] text-lg"></iconify-icon>
            <span class="text-xs font-bold text-gray-400 uppercase tracking-widest">Collateral</span>
          </div>
          <div class="mt-auto">
            <p class="text-xl font-bold text-white">None</p>
            <p class="text-[10px] text-[#F5A623] font-medium uppercase mt-1">Reputation-based</p>
          </div>
        </div>
      </div>

      <!-- Loan Health Meter -->
      <section class="mb-8 glass-card p-5 rounded-3xl">
        <div class="flex justify-between items-center mb-4">
          <span class="text-xs font-bold text-gray-400 uppercase tracking-widest">Loan Health Status</span>
          <span class="text-xs font-bold text-[#10B981] uppercase">Healthy</span>
        </div>
        
        <div class="relative h-2 w-full health-bar rounded-full overflow-hidden">
          <div class="absolute top-0 bottom-0 left-[22%] w-1 bg-white shadow-lg"></div>
        </div>
        
        <div class="flex justify-between mt-3 text-[10px] font-bold text-gray-500 uppercase tracking-tighter">
          <span>Safe</span>
          <span>Warning</span>
          <span>Liquidation Risk</span>
        </div>
      </section>

      <!-- Quick Actions Grid -->
      <section>
        <h2 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-4">Quick Actions</h2>
        <div class="grid grid-cols-2 gap-4">
          <a href="https://draft-70134bff-3035-443b-894e-b72281d4672b.preview.superdesign.dev" id="action-borrow" class="glass-card p-4 rounded-3xl flex flex-col items-center justify-center gap-3 transition-transform active:scale-95">
            <div class="w-12 h-12 rounded-2xl bg-[#F5A623]/10 flex items-center justify-center">
              <iconify-icon icon="lucide:arrow-down-to-line" class="text-[#F5A623] text-2xl"></iconify-icon>
            </div>
            <span class="text-sm font-bold">Borrow</span>
          </a>
          
          <a href="https://draft-f0e1d96b-332a-4ef3-8ddb-9162947be859.preview.superdesign.dev" id="action-repay" class="glass-card p-4 rounded-3xl flex flex-col items-center justify-center gap-3 transition-transform active:scale-95">
            <div class="w-12 h-12 rounded-2xl bg-[#F5A623]/10 flex items-center justify-center">
              <iconify-icon icon="lucide:arrow-up-from-line" class="text-[#F5A623] text-2xl"></iconify-icon>
            </div>
            <span class="text-sm font-bold">Repay</span>
          </a>

          <a href="#" id="action-collateral" class="glass-card p-4 rounded-3xl flex flex-col items-center justify-center gap-3 transition-transform active:scale-95 opacity-50 cursor-not-allowed">
            <div class="w-12 h-12 rounded-2xl bg-gray-500/10 flex items-center justify-center">
              <iconify-icon icon="lucide:plus-circle" class="text-gray-400 text-2xl"></iconify-icon>
            </div>
            <span class="text-sm font-bold">Add Collateral</span>
          </a>

          <a href="#" id="action-invite" class="glass-card p-4 rounded-3xl flex flex-col items-center justify-center gap-3 transition-transform active:scale-95">
            <div class="w-12 h-12 rounded-2xl bg-[#F5A623]/10 flex items-center justify-center">
              <iconify-icon icon="lucide:users" class="text-[#F5A623] text-2xl"></iconify-icon>
            </div>
            <span class="text-sm font-bold">Invite Friend</span>
          </a>
        </div>
      </section>
    </main>

    <!-- Bottom Tab Bar -->
    <!-- component: BottomTabBar (f4af316d-a3ce-499f-a7c9-bcbd63afc6a8) -->
<div v-scope="{ ...{&quot;activeItem&quot;:&quot;home&quot;,&quot;homeHref&quot;:&quot;https://draft-86f3e69d-7c2e-46d2-b819-1484ce374498.preview.superdesign.dev&quot;,&quot;investHref&quot;:&quot;https://draft-efb2cc33-6230-46b6-8890-4a19567c3d76.preview.superdesign.dev&quot;,&quot;profileHref&quot;:&quot;https://draft-17f03956-158b-4529-a577-c6bc613e4392.preview.superdesign.dev&quot;}, $emit() {} }">
<nav class="fixed bottom-0 left-0 right-0 h-[88px] bg-[#0F1420] border-t border-white/5 flex items-center justify-around px-4 z-50"><a :href="homeHref" class="flex flex-col items-center gap-1 transition-colors hover:text-[#F5A623]" :class="activeItem === 'home' ? 'text-[#F5A623]' : 'text-gray-400'"><iconify-icon icon="lucide:home" class="text-2xl"></iconify-icon><span class="text-[10px] font-bold uppercase tracking-widest">Home</span></a><a :href="investHref" class="flex flex-col items-center gap-1 transition-colors hover:text-[#F5A623]" :class="activeItem === 'invest' ? 'text-[#F5A623]' : 'text-gray-400'"><iconify-icon icon="lucide:trending-up" class="text-2xl"></iconify-icon><span class="text-[10px] font-bold uppercase tracking-widest">Invest</span></a><a :href="profileHref" class="flex flex-col items-center gap-1 transition-colors hover:text-[#F5A623]" :class="activeItem === 'profile' ? 'text-[#F5A623]' : 'text-gray-400'"><iconify-icon icon="lucide:user" class="text-2xl"></iconify-icon><span class="text-[10px] font-bold uppercase tracking-widest">Profile</span></a></nav>
</div>
<!-- /component: BottomTabBar (f4af316d-a3ce-499f-a7c9-bcbd63afc6a8) -->

  </div>
</body>
</html>
